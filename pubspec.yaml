name: Dilara
description: "Dilara."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.1.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.5.3
  firebase_core: ^4.2.1
  http: ^1.4.0
  google_fonts: ^8.0.2
  carousel_slider: ^5.0.0
  flutter_widget_from_html: ^0.17.1
  share_plus: ^12.0.1
  html_character_entities: ^1.0.0+1
  assets_audio_player:
    git:
      url: https://github.com/florent37/Flutter-AssetsAudioPlayer

  flutter_html: ^3.0.0
  change_app_package_name: ^1.5.0
  firebase_messaging: ^16.0.4
  permission_handler: ^12.0.0+1
  firebase_analytics: ^12.0.4
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.1.11
  flutter_tts: ^4.2.3
  geolocator: ^14.0.2
  intl: ^0.20.2
  awesome_notifications: ^0.11.0
  dio: ^5.7.0
  path_provider: ^2.1.5 
  lottie: ^3.3.2
  connectivity_plus: ^7.0.0
  youtube_player_flutter: ^9.1.3
  webview_flutter: ^4.13.1
  shared_preferences_foundation: ^2.5.6
  flutter_widgetkit: ^1.0.3
  audioplayers: ^6.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true
  
  assets:
    - assets/img/
    - assets/sounds/
    - assets/img/size/
    - assets/animations/download.json
    - assets/animations/error.json
    - assets/animations/success.json
